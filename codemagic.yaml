# codemagic.yaml
# Configuration for building native Android Gradle project on Codemagic

workflows:
  android-debug:
    name: Build Android Debug APK
    max_build_duration: 30
    instance_type: mac_mini_m1 # Highly compatible and supported under Codemagic free tier
    
    environment:
      java: 17 # JDK 17 is the recommended standard for modern Jetpack Compose & Kotlin compilation
      
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
          
    scripts:
      - name: Generate Gradle wrapper if missing
        script: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 9.3.1
          else
            ./gradlew wrapper --gradle-version 9.3.1
          fi
          chmod +x gradlew
          
      - name: Build Android Debug APK
        script: |
          ./gradlew assembleDebug
          
    artifacts:
      - app/build/outputs/apk/debug/*.apk
